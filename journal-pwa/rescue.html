<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rescatar datos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1714;color:#e8e0d4;font-family:system-ui,sans-serif;padding:16px;min-height:100vh}
h1{font-size:18px;text-align:center;margin-bottom:16px}
.entry{background:#23201b;border:1px solid #3d362e;border-radius:10px;padding:14px;margin-bottom:10px}
.date{color:#c4956a;font-size:13px;font-weight:600;margin-bottom:6px}
.text{font-size:14px;line-height:1.5;white-space:pre-wrap}
button{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px}
.btn1{background:#c4956a;color:#1a1714}
.btn2{background:#3d362e;color:#e8e0d4}
.msg{padding:12px;border-radius:10px;margin-bottom:12px;font-size:14px;text-align:center}
.ok{background:rgba(125,184,125,0.2);color:#7db87d}
.bad{background:rgba(196,122,106,0.15);color:#c47a6a}
.info{background:rgba(196,149,106,0.15);color:#c4956a}
#output{margin-top:12px}
pre{background:#111;border:1px solid #3d362e;border-radius:8px;padding:10px;font-size:11px;overflow:auto;max-height:300px;white-space:pre-wrap;word-break:break-all;margin-top:10px}
</style>
</head>
<body>
<h1>Rescatar mis entradas</h1>
<div id="output"></div>

<script>
// Run immediately - no dependencies needed
(function() {
  var out = document.getElementById('output');
  var journalData = null;
  var journalKey = null;

  // Search all possible keys
  var possibleKeys = ['diario-entries', 'journal-entries', 'entries', 'diario', 'journal'];
  for (var i = 0; i < possibleKeys.length; i++) {
    try {
      var raw = localStorage.getItem(possibleKeys[i]);
      if (raw) {
        journalData = JSON.parse(raw);
        journalKey = possibleKeys[i];
        break;
      }
    } catch(e) {}
  }

  // Also search ALL keys for anything that looks like journal data
  if (!journalData) {
    for (var j = 0; j < localStorage.length; j++) {
      var key = localStorage.key(j);
      try {
        var val = JSON.parse(localStorage.getItem(key));
        if (val && typeof val === 'object' && !Array.isArray(val)) {
          var keys = Object.keys(val);
          // Check if keys look like dates (YYYY-MM-DD)
          var dateCount = 0;
          for (var k = 0; k < keys.length; k++) {
            if (/^\d{4}-\d{2}-\d{2}$/.test(keys[k])) dateCount++;
          }
          if (dateCount >= 2) {
            journalData = val;
            journalKey = key;
            break;
          }
        }
      } catch(e) {}
    }
  }

  if (journalData) {
    var dates = Object.keys(journalData).sort();
    var html = '<div class="msg ok">Encontradas ' + dates.length + ' entradas (key: "' + journalKey + '")</div>';
    html += '<button class="btn1" id="btnCopy">COPIAR TODO AL PORTAPAPELES</button>';
    html += '<button class="btn2" id="btnDownload">Descargar como archivo</button>';
    html += '<div id="copyMsg"></div>';

    // Show each entry
    for (var d = 0; d < dates.length; d++) {
      html += '<div class="entry"><div class="date">' + dates[d] + '</div><div class="text">' + escapeHtml(journalData[dates[d]]) + '</div></div>';
    }

    // Also show raw JSON
    var exportObj = {
      exported_at: new Date().toISOString(),
      total_entries: dates.length,
      entries: dates.map(function(date) { return { date: date, text: journalData[date] }; })
    };
    var jsonStr = JSON.stringify(exportObj, null, 2);

    html += '<h1 style="margin-top:20px">Datos en JSON</h1>';
    html += '<pre>' + escapeHtml(jsonStr) + '</pre>';

    out.innerHTML = html;

    document.getElementById('btnCopy').addEventListener('click', function() {
      // Build plain text version
      var plain = '';
      for (var d = 0; d < dates.length; d++) {
        plain += '=== ' + dates[d] + ' ===\n' + journalData[dates[d]] + '\n\n';
      }
      copyToClipboard(plain);
    });

    document.getElementById('btnDownload').addEventListener('click', function() {
      var blob = new Blob([jsonStr], {type: 'application/json'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'diario-backup-' + new Date().toISOString().slice(0,10) + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
  } else {
    // No journal data found - show everything in localStorage
    var html = '<div class="msg bad">No se encontraron entradas del diario en localStorage.</div>';

    if (localStorage.length === 0) {
      html += '<div class="msg info">localStorage esta completamente vacio en este navegador/dominio.</div>';
      html += '<div class="msg info">Asegurate de abrir esta pagina en el MISMO navegador (Chrome, Safari, etc.) donde usabas el Diario.</div>';
    } else {
      html += '<div class="msg info">Hay ' + localStorage.length + ' keys en localStorage. Aqui estan todas:</div>';
      var dump = {};
      for (var m = 0; m < localStorage.length; m++) {
        var lk = localStorage.key(m);
        try { dump[lk] = JSON.parse(localStorage.getItem(lk)); } catch(e) { dump[lk] = localStorage.getItem(lk); }
      }
      var dumpStr = JSON.stringify(dump, null, 2);
      html += '<button class="btn1" id="btnCopyAll">COPIAR TODO</button>';
      html += '<div id="copyMsg"></div>';
      html += '<pre>' + escapeHtml(dumpStr) + '</pre>';

      out.innerHTML = html;
      document.getElementById('btnCopyAll').addEventListener('click', function() {
        copyToClipboard(dumpStr);
      });
      return;
    }

    out.innerHTML = html;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function copyToClipboard(text) {
    var msgEl = document.getElementById('copyMsg');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        msgEl.innerHTML = '<div class="msg ok">Copiado!</div>';
      }).catch(function() {
        fallbackCopy(text, msgEl);
      });
    } else {
      fallbackCopy(text, msgEl);
    }
  }

  function fallbackCopy(text, msgEl) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      document.execCommand('copy');
      msgEl.innerHTML = '<div class="msg ok">Copiado!</div>';
    } catch(e) {
      msgEl.innerHTML = '<div class="msg bad">No se pudo copiar. Selecciona el texto manualmente del JSON de abajo.</div>';
    }
    document.body.removeChild(ta);
  }
})();
</script>
</body>
</html>
