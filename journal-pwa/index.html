<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1714">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diario">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Diario - Rescate de Datos</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1a1714; color:#e8e0d4; font-family:-apple-system,sans-serif;
  padding:20px; padding-top:max(20px,env(safe-area-inset-top));
  min-height:100vh;
}
h1 { font-size:22px; margin-bottom:10px; color:#c4956a; }
p { font-size:14px; color:#9c9285; margin-bottom:15px; }
.btn {
  display:block; width:100%; padding:16px; margin:10px 0;
  background:#c4956a; color:#1a1714; border:none; border-radius:10px;
  font-size:17px; font-weight:600; cursor:pointer;
}
.btn:active { opacity:0.8; }
.btn-secondary { background:#2a2520; color:#e8e0d4; border:1px solid #3d362e; }
.entry {
  background:#23201b; border:1px solid #3d362e; border-radius:10px;
  padding:14px; margin:10px 0;
}
.entry-date { color:#c4956a; font-size:13px; font-weight:600; margin-bottom:6px; }
.entry-text { font-size:14px; line-height:1.5; white-space:pre-wrap; word-break:break-word; }
.entry-field { color:#6b6359; font-size:12px; margin-top:4px; }
#status { padding:12px; border-radius:8px; margin:10px 0; font-size:14px; text-align:center; }
.status-ok { background:rgba(125,184,125,0.2); color:#7db87d; }
.status-empty { background:rgba(196,122,106,0.15); color:#c47a6a; }
textarea {
  width:100%; min-height:200px; background:#23201b; color:#e8e0d4;
  border:1px solid #3d362e; border-radius:10px; padding:12px;
  font-family:monospace; font-size:12px; margin:10px 0;
}
</style>
</head>
<body>

<h1>Rescate de Datos</h1>
<p>Esta pagina busca TODOS tus datos guardados en este dispositivo.</p>

<div id="status">Buscando datos...</div>

<button class="btn" id="btnDownload" style="display:none">Descargar como archivo de texto</button>
<button class="btn btn-secondary" id="btnCopy" style="display:none">Copiar todo al portapapeles</button>

<div id="entries"></div>

<div style="margin-top:20px;">
  <p>Datos crudos (todo localStorage):</p>
  <textarea id="rawData" readonly></textarea>
</div>

<script>
// Unregister old service worker to prevent caching issues
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    regs.forEach(function(r) { r.unregister(); });
  });
}

(function() {
  var entries = [];
  var allData = {};
  var rawText = '';

  // Collect EVERYTHING from localStorage
  try {
    for (var i = 0; i < localStorage.length; i++) {
      var key = localStorage.key(i);
      var val = localStorage.getItem(key);
      allData[key] = val;

      // Try to parse journal entries
      try {
        var parsed = JSON.parse(val);
        // Check if it's an array of entries
        if (Array.isArray(parsed)) {
          parsed.forEach(function(item) {
            if (item && (item.text || item.content || item.body || item.nota || item.entry || item.date || item.fecha)) {
              item._sourceKey = key;
              entries.push(item);
            }
          });
        }
        // Check if it's a single entry object
        if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
          if (parsed.text || parsed.content || parsed.body || parsed.nota || parsed.entry) {
            parsed._sourceKey = key;
            entries.push(parsed);
          }
          // Check if it's an object with date keys
          Object.keys(parsed).forEach(function(k) {
            if (parsed[k] && typeof parsed[k] === 'object' && (parsed[k].text || parsed[k].content || parsed[k].body)) {
              parsed[k]._sourceKey = key + '.' + k;
              parsed[k]._dateKey = k;
              entries.push(parsed[k]);
            }
          });
        }
      } catch(e) {
        // Not JSON, check if it looks like a journal entry (plain text with date-like key)
        if (key.match(/\d{4}/) && val.length > 10) {
          entries.push({ _sourceKey: key, text: val, date: key });
        }
      }
    }
  } catch(e) {
    document.getElementById('status').textContent = 'Error leyendo datos: ' + e.message;
    document.getElementById('status').className = 'status-empty';
  }

  // Show raw localStorage dump
  rawText = JSON.stringify(allData, null, 2);
  document.getElementById('rawData').value = rawText;

  // Status
  var statusEl = document.getElementById('status');
  var keysCount = Object.keys(allData).length;

  if (keysCount === 0) {
    statusEl.textContent = 'localStorage esta VACIO en este contexto. Total de claves: 0';
    statusEl.className = 'status-empty';
  } else {
    statusEl.textContent = 'Encontradas ' + keysCount + ' claves en localStorage, ' + entries.length + ' posibles entradas de diario';
    statusEl.className = 'status-ok';
    document.getElementById('btnDownload').style.display = 'block';
    document.getElementById('btnCopy').style.display = 'block';
  }

  // Display entries
  var container = document.getElementById('entries');
  if (entries.length > 0) {
    entries.forEach(function(e, i) {
      var div = document.createElement('div');
      div.className = 'entry';
      var date = e.date || e.fecha || e.created_at || e.timestamp || e._dateKey || '';
      var text = e.text || e.content || e.body || e.nota || e.entry || JSON.stringify(e);
      div.innerHTML = '<div class="entry-date">' + (date || 'Entrada ' + (i+1)) + '</div>' +
        '<div class="entry-text">' + escapeHtml(String(text)) + '</div>' +
        '<div class="entry-field">Fuente: ' + escapeHtml(e._sourceKey || '?') + '</div>';
      container.appendChild(div);
    });
  } else if (keysCount > 0) {
    container.innerHTML = '<div class="entry"><div class="entry-text">No se encontraron entradas de diario estructuradas, pero hay datos. Revisa el cuadro de "Datos crudos" abajo.</div></div>';
  }

  // Download button
  document.getElementById('btnDownload').addEventListener('click', function() {
    var content = '=== RESCATE DE DATOS - DIARIO ===\n';
    content += 'Fecha de rescate: ' + new Date().toLocaleString() + '\n';
    content += 'Total claves localStorage: ' + keysCount + '\n';
    content += 'Entradas encontradas: ' + entries.length + '\n\n';

    if (entries.length > 0) {
      content += '=== ENTRADAS ===\n\n';
      entries.forEach(function(e, i) {
        var date = e.date || e.fecha || e.created_at || e.timestamp || e._dateKey || 'Sin fecha';
        var text = e.text || e.content || e.body || e.nota || e.entry || JSON.stringify(e);
        content += '--- Entrada ' + (i+1) + ' ---\n';
        content += 'Fecha: ' + date + '\n';
        content += text + '\n\n';
      });
    }

    content += '\n=== DATOS CRUDOS (localStorage completo) ===\n\n';
    content += rawText;

    var blob = new Blob([content], {type:'text/plain;charset=utf-8'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'diario-rescate-' + new Date().toISOString().slice(0,10) + '.txt';
    a.click();
  });

  // Copy button
  document.getElementById('btnCopy').addEventListener('click', function() {
    var ta = document.getElementById('rawData');
    ta.select();
    try {
      document.execCommand('copy');
      alert('Datos copiados al portapapeles');
    } catch(e) {
      navigator.clipboard.writeText(ta.value).then(function() {
        alert('Datos copiados al portapapeles');
      }).catch(function() {
        alert('No se pudo copiar. Selecciona el texto manualmente y copia.');
      });
    }
  });

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
})();
</script>
</body>
</html>
