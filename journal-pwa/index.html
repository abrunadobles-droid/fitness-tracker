<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diario - Recuperar datos de Supabase</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1714;color:#e8e0d4;font-family:-apple-system,sans-serif;padding:20px;min-height:100vh}
h1{font-size:20px;color:#c4956a;margin-bottom:10px}
p{font-size:14px;color:#9c9285;margin-bottom:12px}
.btn{display:block;width:100%;padding:15px;margin:8px 0;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.btn-primary{background:#c4956a;color:#1a1714}
.btn-secondary{background:#2a2520;color:#e8e0d4;border:1px solid #3d362e}
.btn:active{opacity:0.8}
input{width:100%;padding:13px;background:#23201b;color:#e8e0d4;border:1px solid #3d362e;border-radius:10px;font-size:15px;margin:6px 0}
input::placeholder{color:#6b6359}
.msg{padding:12px;border-radius:8px;margin:10px 0;font-size:14px;text-align:center}
.ok{background:rgba(125,184,125,0.2);color:#7db87d}
.bad{background:rgba(196,122,106,0.15);color:#c47a6a}
.info{background:rgba(196,149,106,0.15);color:#c4956a}
.entry{background:#23201b;border:1px solid #3d362e;border-radius:10px;padding:14px;margin:8px 0}
.entry-date{color:#c4956a;font-size:13px;font-weight:600;margin-bottom:6px}
.entry-text{font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
#auth-section,#data-section{margin-top:15px}
.hidden{display:none}
textarea{width:100%;min-height:150px;background:#23201b;color:#e8e0d4;border:1px solid #3d362e;border-radius:10px;padding:12px;font-family:monospace;font-size:11px;margin:8px 0}
</style>
</head>
<body>

<h1>Recuperar datos del Diario</h1>
<p>Tus datos estan guardados en Supabase (la nube). Inicia sesion para recuperarlos.</p>

<div id="auth-section">
  <input type="email" id="email" placeholder="Tu email">
  <input type="password" id="password" placeholder="Tu contraseña">
  <button class="btn btn-primary" id="btnLogin">Iniciar sesion</button>
  <button class="btn btn-secondary" id="btnGoogle">Iniciar con Google</button>
  <div id="authMsg"></div>
</div>

<div id="data-section" class="hidden">
  <div id="status"></div>
  <button class="btn btn-primary hidden" id="btnDownload">Descargar como archivo</button>
  <button class="btn btn-secondary hidden" id="btnCopy">Copiar todo al portapapeles</button>
  <div id="copyMsg"></div>
  <div id="entries"></div>
  <textarea id="rawData" class="hidden" readonly></textarea>
</div>

<script>
var SUPABASE_URL = 'https://bailojpedwczadqhtqtl.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhaWxvanBlZHdjemFkcWh0cXRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3MTk3MzQsImV4cCI6MjA4NTI5NTczNH0.Hn97q3nYnJDOinFt0eEsPukwBiglqjl2I5vqoxiAgek';

var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Check if already logged in
sb.auth.getSession().then(function(result) {
  if (result.data.session) {
    showLoggedIn(result.data.session.user);
    loadEntries(result.data.session.user.id);
  }
});

// Handle OAuth redirect
sb.auth.onAuthStateChange(function(event, session) {
  if (event === 'SIGNED_IN' && session) {
    showLoggedIn(session.user);
    loadEntries(session.user.id);
  }
});

document.getElementById('btnLogin').addEventListener('click', function() {
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  if (!email || !password) {
    document.getElementById('authMsg').innerHTML = '<div class="msg bad">Escribe email y contraseña</div>';
    return;
  }
  document.getElementById('authMsg').innerHTML = '<div class="msg info">Iniciando sesion...</div>';
  sb.auth.signInWithPassword({ email: email, password: password }).then(function(result) {
    if (result.error) {
      document.getElementById('authMsg').innerHTML = '<div class="msg bad">Error: ' + result.error.message + '</div>';
    } else {
      showLoggedIn(result.data.user);
      loadEntries(result.data.user.id);
    }
  });
});

document.getElementById('btnGoogle').addEventListener('click', function() {
  sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
});

function showLoggedIn(user) {
  document.getElementById('auth-section').innerHTML = '<div class="msg ok">Conectado como: ' + escapeHtml(user.email || user.id) + '</div>';
  document.getElementById('data-section').classList.remove('hidden');
}

function loadEntries(userId) {
  var statusEl = document.getElementById('status');
  statusEl.innerHTML = '<div class="msg info">Buscando entradas en Supabase...</div>';

  sb.from('journal_entries').select('*').eq('user_id', userId).order('entry_date', { ascending: false }).then(function(result) {
    if (result.error) {
      statusEl.innerHTML = '<div class="msg bad">Error cargando datos: ' + result.error.message + '</div>';
      return;
    }

    var entries = result.data || [];
    if (entries.length === 0) {
      statusEl.innerHTML = '<div class="msg bad">No se encontraron entradas para este usuario.</div>';
      return;
    }

    statusEl.innerHTML = '<div class="msg ok">Encontradas ' + entries.length + ' entradas!</div>';
    document.getElementById('btnDownload').classList.remove('hidden');
    document.getElementById('btnCopy').classList.remove('hidden');

    // Show entries
    var container = document.getElementById('entries');
    var html = '';
    entries.forEach(function(e) {
      html += '<div class="entry"><div class="entry-date">' + escapeHtml(e.entry_date || '') + '</div>';
      html += '<div class="entry-text">' + escapeHtml(e.content || e.text || JSON.stringify(e)) + '</div></div>';
    });
    container.innerHTML = html;

    // Raw JSON
    var jsonStr = JSON.stringify(entries, null, 2);
    var rawEl = document.getElementById('rawData');
    rawEl.value = jsonStr;
    rawEl.classList.remove('hidden');

    // Download
    document.getElementById('btnDownload').addEventListener('click', function() {
      var content = '=== DIARIO - BACKUP ===\n';
      content += 'Fecha: ' + new Date().toLocaleString() + '\n';
      content += 'Total entradas: ' + entries.length + '\n\n';
      entries.forEach(function(e) {
        content += '--- ' + (e.entry_date || 'Sin fecha') + ' ---\n';
        content += (e.content || e.text || '') + '\n\n';
      });
      content += '\n\n=== JSON COMPLETO ===\n' + jsonStr;

      var blob = new Blob([content], {type:'text/plain;charset=utf-8'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'diario-backup-' + new Date().toISOString().slice(0,10) + '.txt';
      a.click();
    });

    // Copy
    document.getElementById('btnCopy').addEventListener('click', function() {
      var plain = '';
      entries.forEach(function(e) {
        plain += '=== ' + (e.entry_date || 'Sin fecha') + ' ===\n';
        plain += (e.content || e.text || '') + '\n\n';
      });
      if (navigator.clipboard) {
        navigator.clipboard.writeText(plain).then(function() {
          document.getElementById('copyMsg').innerHTML = '<div class="msg ok">Copiado!</div>';
        }).catch(function() { fallbackCopy(plain); });
      } else { fallbackCopy(plain); }
    });
  });
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); document.getElementById('copyMsg').innerHTML = '<div class="msg ok">Copiado!</div>'; }
  catch(e) { document.getElementById('copyMsg').innerHTML = '<div class="msg bad">No se pudo copiar automaticamente.</div>'; }
  document.body.removeChild(ta);
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
