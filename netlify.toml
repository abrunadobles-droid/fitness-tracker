[build]
  publish = "journal-pwa"

[functions]
  directory = "journal-pwa/netlify/functions"

[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze"
  status = 200

[[redirects]]
  from = "/export.html"
  to = "/export.html"
  status = 200

[[redirects]]
  from = "/rescue.html"
  to = "/rescue.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
