name: WHOOP Daily Sync

on:
  schedule:
    # Corre todos los días a las 7:00 AM Costa Rica (UTC-6 = 13:00 UTC)
    - cron: '0 13 * * *'
  workflow_dispatch: # Permite correrlo manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run WHOOP sync
        env:
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_TOKENS_JSON: ${{ secrets.WHOOP_TOKENS_JSON }}
        run: python whoop_sync.py --all

      - name: Save updated tokens as secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Después del sync, whoop_tokens.json tiene los tokens renovados
          if [ -f whoop_tokens.json ]; then
            echo "Actualizando secreto WHOOP_TOKENS_JSON con tokens renovados..."
            gh secret set WHOOP_TOKENS_JSON --body "$(cat whoop_tokens.json)"
            echo "Tokens actualizados exitosamente"
          else
            echo "No se encontró whoop_tokens.json - tokens no actualizados"
          fi

      - name: Commit and push cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add whoop_cache.json
          if git diff --cached --quiet; then
            echo "No hay cambios en whoop_cache.json"
          else
            git commit -m "Sync WHOOP data $(date +'%Y-%m-%d')"
            git push
          fi
