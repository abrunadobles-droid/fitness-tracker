name: Daily Fitness Sync

on:
  schedule:
    # Corre todos los días a las 7:00 AM Costa Rica (UTC-6 = 13:00 UTC)
    - cron: '0 13 * * *'
  workflow_dispatch: # Permite correrlo manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests garminconnect 'garth>=0.7.9'

      - name: Run WHOOP sync
        id: whoop_sync
        continue-on-error: true
        env:
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_TOKENS_JSON: ${{ secrets.WHOOP_TOKENS_JSON }}
        run: python whoop_sync.py --all

      - name: Save updated WHOOP tokens
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f whoop_tokens.json ]; then
            echo "Actualizando secreto WHOOP_TOKENS_JSON..."
            gh secret set WHOOP_TOKENS_JSON --body "$(cat whoop_tokens.json)"
            echo "WHOOP tokens actualizados"
          else
            echo "No hay whoop_tokens.json (sync probablemente falló)"
          fi

      - name: Run Garmin sync
        id: garmin_sync
        continue-on-error: true
        timeout-minutes: 10
        env:
          GARMIN_TOKENS_JSON: ${{ secrets.GARMIN_TOKENS_JSON }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python garmin_sync.py --all

      - name: Save updated Garmin tokens
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          UPDATED_TOKENS=$(python -c "
          from garmin_client import _export_tokens_json
          import tempfile, os
          tmpdir = os.path.join(tempfile.gettempdir(), 'garmin_tokens')
          tokens = _export_tokens_json(tmpdir)
          if tokens:
              print(tokens)
          " 2>/dev/null)
          if [ -n "$UPDATED_TOKENS" ]; then
            echo "Actualizando secreto GARMIN_TOKENS_JSON..."
            gh secret set GARMIN_TOKENS_JSON --body "$UPDATED_TOKENS"
            echo "Garmin tokens actualizados"
          else
            echo "No hay tokens Garmin para guardar (sync probablemente falló)"
          fi

      - name: Commit and push caches
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add whoop_cache.json garmin_cache.json
          if git diff --cached --quiet; then
            echo "No hay cambios en caches"
          else
            git commit -m "Sync fitness data $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Fail job if both syncs failed
        if: steps.whoop_sync.outcome == 'failure' && steps.garmin_sync.outcome == 'failure'
        run: |
          echo "Ambos syncs fallaron — revisa logs"
          exit 1
